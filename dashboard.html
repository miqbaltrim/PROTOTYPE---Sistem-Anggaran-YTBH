<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Anggaran — Dasbor</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sidebar.css">

  <style>
    :root {
      --cream: #f4f7fc;
      --cream-mid: #e8eef8;
      --cream-dark: #d5e0f0;
      --sand: #c2d0e6;
      --amber: #F68B21;
      --amber-light: #ffaa50;
      --amber-dim: rgba(246,139,33,0.12);
      --amber-glow: rgba(246,139,33,0.22);
      --sage: #3972B8;
      --sage-light: #5a90d6;
      --sage-dim: rgba(57,114,184,0.1);
      --sage-glow: rgba(57,114,184,0.18);
      --ink: #1a2333;
      --ink-mid: #2e3f5c;
      --ink-soft: #5a6e8a;
      --ink-muted: #8fa0b8;
      --white: #ffffff;
      --danger: #d94040;
      --danger-dim: rgba(217,64,64,0.1);
      --warning: #c07010;
      --warning-dim: rgba(192,112,16,0.12);
      --success: #217a4a;
      --success-dim: rgba(33,122,74,0.1);
      --radius: 16px;
      --radius-sm: 10px;
      --radius-xs: 7px;
      --shadow-sm: 0 1px 4px rgba(57,114,184,0.07);
      --shadow: 0 2px 12px rgba(57,114,184,0.1);
      --shadow-md: 0 6px 28px rgba(57,114,184,0.14);
      --sidebar-w: 248px;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
    }

    .app-shell {
      display: block;
      min-height: 100vh;
    }

    .main {
      background: var(--cream);
      overflow-y: auto;
      margin-left: 240px;
      min-height: 100vh;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 90;
      background: rgba(244,247,252,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--cream-dark);
      padding: 14px 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .content {
      padding: 32px 36px 48px;
    }

    @media (max-width:900px) {
      .main {
        margin-left: 0 !important;
      }
    }
  </style>
</head>

<body data-page="dashboard">
  <div class="app-shell">
    <div id="sb-root"></div>

    <div class="main">
      <div class="topbar">
        ...
      </div>

      <div class="content">
        ...
      </div>
    </div>
  </div>

  <script>
    // script dashboard kamu
  </script>

  <script src="sidebar.js"></script>
</body>
</html>
